name: Standard Publish
permissions: write-all
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Select Version To Bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:

  publish:
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout Repo
        id: checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.PUBLISHER_SSH_KEY }}
          submodules: recursive
          fetch-depth: 0

      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 10G

      # Prepare and build sushi lib
      - name: Build Sushi Lib
        id: sushi
        if: steps.checkout.outcome == 'success'
        run: ./prep-sushi.sh

      # Install node
      - name: Install NodeJS v22
        id: node
        if: steps.sushi.outcome == 'success'
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      # Install deps
      - name: Install Dependencies
        id: install
        if: steps.node.outcome == 'success'
        run: npm install

      # Configure Git
      - name: Git Config
        id: git
        if: steps.install.outcome == 'success'
        run: |
          git config --global user.email "${{ secrets.CI_GIT_EMAIL }}"
          git config --global user.name "${{ secrets.CI_GIT_USER }}"

      # Set Release Version
      - name: Bump Version
        id: version
        if: steps.git.outcome == 'success'
        # bump the version without creating tag/commit and store the version in env
        run: echo "NEW_VERSION=$(npm version ${{ inputs.version }} --no-git-tag-version)" >> $GITHUB_ENV

      # Commit changes and tag
      - name: Commit And Tag
        id: commit
        if: steps.version.outcome == 'success'
        run: |
          git add "package.json"
          git add "package-lock.json"
          git commit -m "Release ${{ env.NEW_VERSION }}"
          git tag ${{ env.NEW_VERSION }}

      # Push changes and tag
      - name: Push Changes To Remote
        id: push
        if: steps.commit.outcome == 'success'
        run: | 
          git push origin 
          git push -u origin ${{ env.NEW_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create gitHub release with built package archives
      - name: Create GitHub Release
        id: release
        if: steps.push.outcome == 'success'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NEW_VERSION }}
          name: Release ${{ env.NEW_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
